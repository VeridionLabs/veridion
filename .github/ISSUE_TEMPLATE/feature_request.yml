name: Feature Request
description: Suggest a new feature for Veridion
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important to you?
  - type: textarea
    id: implementation
    attributes:
      label: Proposed Implementation
      description: Any ideas on how this could be implemented?
