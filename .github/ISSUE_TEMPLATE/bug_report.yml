name: Bug Report
description: Report a bug in Veridion
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: 'Thanks for taking the time to file a bug report!'
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the bug
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Veridion Version
      placeholder: '0.1.0'
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: ['macOS', 'Linux', 'Windows']
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell
